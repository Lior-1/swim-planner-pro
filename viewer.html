<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f4ef;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;}
.card{background:#fff;border-radius:20px;box-shadow:0 8px 48px rgba(0,0,0,0.13);padding:48px 40px;max-width:380px;width:90%;text-align:center;}
.brand{font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:#aaa;font-family:monospace;margin-bottom:10px;}
.plan-title{font-size:22px;font-weight:700;color:#1a3a5c;margin-bottom:5px;}
.plan-meta{font-size:13px;color:#999;font-family:monospace;margin-bottom:18px;}
.pdf-preview{width:100%;height:200px;border-radius:12px;border:2px solid #e0ddd6;overflow:hidden;margin-bottom:20px;position:relative;cursor:pointer;background:#f5f4ef;}
.pdf-preview iframe{position:absolute;left:0;top:0;width:794px;height:600px;transform-origin:0 0;border:none;pointer-events:none;display:none;}
.pdf-preview .pdf-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(26,58,92,0);transition:background 0.2s;}
.pdf-preview:hover .pdf-overlay{background:rgba(26,58,92,0.45);}
.pdf-preview .pdf-overlay span{color:#fff;font-size:14px;font-weight:600;font-family:monospace;letter-spacing:0.1em;text-transform:uppercase;opacity:0;transition:opacity 0.2s;}
.pdf-preview:hover .pdf-overlay span{opacity:1;}
.pdf-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f5f4ef;}
.btn-p{width:100%;padding:14px;background:#1a3a5c;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:12px;font-family:Georgia,serif;}
.btn-s{width:100%;padding:14px;background:transparent;color:#1a3a5c;border:2px solid #1a3a5c;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:Georgia,serif;}
.err{color:#c0392b;font-size:15px;margin-top:20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#1a3a5c;border-radius:50%;animation:spin 0.9s linear infinite;}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="brand">Swim Planner Pro</div>
  <div class="plan-title" id="planTitle">Schwimmtraining</div>
  <div class="plan-meta" id="planMeta"></div>
  <div class="pdf-preview" id="pdfPreview">
    <div class="pdf-spinner" id="pdfSpinner"><div class="spinner"></div></div>
    <iframe id="pdfFrame" style="display:none"></iframe>
    <div class="pdf-overlay"><span>Öffnen</span></div>
  </div>
  <button class="btn-p" id="btnPdf">&#8595;&nbsp; PDF herunterladen</button>
  <button class="btn-s" id="btnEdit">&#9998;&nbsp; PDF bearbeiten</button>
</div>
<script>
(function(){
  var hash = window.location.hash || '';
  var prefix = '#SWIMQR:';
  if (hash.indexOf(prefix) !== 0) {
    document.getElementById('card').innerHTML = '<div class="brand">Swim Planner Pro</div><p class="err">Ungültiger QR-Code</p>';
    return;
  }
  var b64 = hash.slice(prefix.length);

  function decodeHash(str) {
    if (str.indexOf('Z.') === 0) {
      var raw = str.slice(2);
      var bin = atob(raw);
      var bytes = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      var ds = new DecompressionStream('deflate-raw');
      var writer = ds.writable.getWriter();
      writer.write(bytes); writer.close();
      var reader = ds.readable.getReader();
      var chunks = [];
      return (function readChunk() {
        return reader.read().then(function(r) {
          if (r.done) { var dec = new TextDecoder(); return chunks.map(function(c){ return dec.decode(c); }).join(''); }
          chunks.push(r.value); return readChunk();
        });
      })();
    }
    return Promise.resolve(decodeURIComponent(escape(atob(str))));
  }

  decodeHash(b64).then(function(json) {
    var data = JSON.parse(json);
    var title = (data.v === 2 ? data.t : data.title) || 'Schwimmtraining';
    var date  = (data.v === 2 ? data.d : data.date)  || '';
    var coach = (data.v === 2 ? data.c : data.coach) || '';
    document.getElementById('planTitle').textContent = title;
    document.getElementById('planMeta').textContent  = [date, coach].filter(Boolean).join(' · ');

    var base = 'https://lior-1.github.io/swim-planner-pro/index.html';
    var appUrl  = base + '#SWIMQR:' + b64;
    var viewUrl = base + '#SWIMQR:' + b64 + '&view=1';
    var previewUrl = base + '#SWIMQR:' + b64 + '&preview=1';
    var pdfUrl  = base + '#SWIMQR:' + b64 + '&pdf=1';

    // Vorschau: Dokumentansicht laden
    var frame = document.getElementById('pdfFrame');
    var spinner = document.getElementById('pdfSpinner');
    function fitFrame() {
      var cw = document.getElementById('pdfPreview').offsetWidth;
      frame.style.transform = 'scale(' + (cw / 794) + ')';
    }
    frame.onload = function() {
      try {
        var s = frame.contentDocument.createElement('style');
        s.textContent = 'html,body{overflow:hidden!important}::-webkit-scrollbar{display:none!important}#viewDownloadBtn{display:none!important}';
        frame.contentDocument.head.appendChild(s);
      } catch(e) {}
      fitFrame();
      spinner.style.display = 'none';
      frame.style.display = 'block';
    };
    window.addEventListener('resize', fitFrame);
    frame.src = viewUrl;

    // Klick auf Vorschau → Dokumentansicht öffnen
    document.getElementById('pdfPreview').onclick = function() {
      window.location.href = viewUrl;
    };

    // PDF herunterladen
    document.getElementById('btnPdf').onclick = function() {
      window.location.href = pdfUrl;
    };

    // PDF bearbeiten → direkt zu index.html mit Hash (PW-Overlay erscheint dort)
    document.getElementById('btnEdit').onclick = function() {
      window.location.href = appUrl;
    };
  }).catch(function() {
    document.getElementById('card').innerHTML = '<div class="brand">Swim Planner Pro</div><p class="err">QR-Daten fehlerhaft</p>';
  });
})();
</script>
</body>
</html>
